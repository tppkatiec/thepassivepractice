<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
@font-face {
  font-family: 'Ivy Presto Headline SemiBold';
  src: url('https://thepassivepractice.mykajabi.com/resource_redirect/downloads/file-uploads/sites/2148581503/themes/2161941479/downloads/5053da3-e7d-72e4-edb0-d3a1ab84057_ivy-presto-headline-semi-bold.woff2') format('woff2');
  font-display: swap;
}

body {
  margin: 0;
  padding: 0;
  background: #F6F5F5;
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
}

.card {
  width: 600px;
  height: 600px;
  background: #F6F5F5;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 60px;
}

.headline {
  font-family: 'Ivy Presto Headline SemiBold', Georgia, serif;
  font-size: 64px;
  line-height: 1.12;
  color: #363030;
}

.headline em {
  font-style: italic;
  color: #E17351;
}
</style>
</head>
<body>
<div class="card">
  <div class="headline">Brand<br><em>Discovery</em></div>
</div>
</body>
</html>
